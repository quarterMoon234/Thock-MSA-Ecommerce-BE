services:
  # ==================== API Gateway (외부 진입점) ====================
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      JAVA_TOOL_OPTIONS: "-Duser.timezone=Asia/Seoul -Xms256m -Xmx512m"
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      LOG_PATH: /app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redpanda:
        condition: service_started
      member-service:
        condition: service_started
      product-service:
        condition: service_started
      market-service:
        condition: service_started
      payment-service:
        condition: service_started
      settlement-service:
        condition: service_started
    networks:
      - internal
    volumes:
      - ./logs/gateway:/app/logs
    restart: unless-stopped

  # ==================== Application Services ====================
  member-service:
    build:
      context: .
      dockerfile: member-service/Dockerfile
    container_name: member-service
    expose:
      - "8081"
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      JAVA_TOOL_OPTIONS: "-Duser.timezone=Asia/Seoul -Xms256m -Xmx512m"
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: thock_member_db
      MYSQL_USER: thock_member_db_user
      MYSQL_PASSWORD: ${MEMBER_DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      LOG_PATH: /app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redpanda:
        condition: service_started
    networks:
      - internal
    volumes:
      - ./logs/member:/app/logs
    restart: unless-stopped

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: product-service
    expose:
      - "8082"
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      JAVA_TOOL_OPTIONS: "-Duser.timezone=Asia/Seoul -Xms256m -Xmx512m"
      SPRING_PROFILES_ACTIVE: ${PRODUCT_SERVICE_PROFILES_ACTIVE:-docker}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: thock_product_db
      MYSQL_USER: thock_product_db_user
      MYSQL_PASSWORD: ${PRODUCT_DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      PRODUCT_EVENT_PUBLISH_MODE: ${PRODUCT_EVENT_PUBLISH_MODE:-outbox}
      PRODUCT_OUTBOX_ENABLED: ${PRODUCT_OUTBOX_ENABLED:-true}
      PRODUCT_OUTBOX_MAX_RETRIES: ${PRODUCT_OUTBOX_MAX_RETRIES:-10}
      PRODUCT_OUTBOX_RETRY_DELAY_MS: ${PRODUCT_OUTBOX_RETRY_DELAY_MS:-5000}
      PRODUCT_OUTBOX_MAX_RETRY_DELAY_MS: ${PRODUCT_OUTBOX_MAX_RETRY_DELAY_MS:-300000}
      PRODUCT_OUTBOX_KAFKA_REQUEST_TIMEOUT_MS: ${PRODUCT_OUTBOX_KAFKA_REQUEST_TIMEOUT_MS:-2000}
      PRODUCT_OUTBOX_KAFKA_DELIVERY_TIMEOUT_MS: ${PRODUCT_OUTBOX_KAFKA_DELIVERY_TIMEOUT_MS:-5000}
      PRODUCT_OUTBOX_KAFKA_RETRY_BACKOFF_MS: ${PRODUCT_OUTBOX_KAFKA_RETRY_BACKOFF_MS:-1000}
      PRODUCT_OUTBOX_KAFKA_MAX_BLOCK_MS: ${PRODUCT_OUTBOX_KAFKA_MAX_BLOCK_MS:-5000}
      PRODUCT_OUTBOX_POLLER_INTERVAL_MS: ${PRODUCT_OUTBOX_POLLER_INTERVAL_MS:-3000}
      PRODUCT_OUTBOX_POLLER_AFTER_SEND_DELAY_MS: ${PRODUCT_OUTBOX_POLLER_AFTER_SEND_DELAY_MS:-0}
      PRODUCT_OUTBOX_CLEANUP_ENABLED: ${PRODUCT_OUTBOX_CLEANUP_ENABLED:-true}
      PRODUCT_OUTBOX_CLEANUP_INTERVAL_MS: ${PRODUCT_OUTBOX_CLEANUP_INTERVAL_MS:-3600000}
      PRODUCT_OUTBOX_CLEANUP_RETENTION_DAYS: ${PRODUCT_OUTBOX_CLEANUP_RETENTION_DAYS:-7}
      PRODUCT_OUTBOX_CLEANUP_BATCH_SIZE: ${PRODUCT_OUTBOX_CLEANUP_BATCH_SIZE:-500}
      LOG_PATH: /app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redpanda:
        condition: service_started
    networks:
      - internal
    volumes:
      - ./logs/product:/app/logs
    restart: unless-stopped

  market-service:
    build:
      context: .
      dockerfile: market-service/Dockerfile
    container_name: market-service
    expose:
      - "8083"
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      JAVA_TOOL_OPTIONS: "-Duser.timezone=Asia/Seoul -Xms256m -Xmx512m"
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: thock_market_db
      MYSQL_USER: thock_market_db_user
      MYSQL_PASSWORD: ${MARKET_DB_PASSWORD}
      PRODUCT_SERVICE_URL: http://product-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8084
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      LOG_PATH: /app/logs
    depends_on:
      mysql:
        condition: service_healthy
      product-service:
        condition: service_started
      payment-service:
        condition: service_started
      redpanda:
        condition: service_started
    networks:
      - internal
    volumes:
      - ./logs/market:/app/logs
    restart: unless-stopped

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    expose:
      - "8084"
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      JAVA_TOOL_OPTIONS: "-Duser.timezone=Asia/Seoul -Xms256m -Xmx512m"
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: thock_payment_db
      MYSQL_USER: thock_payment_db_user
      MYSQL_PASSWORD: ${PAYMENT_DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      LOG_PATH: /app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redpanda:
        condition: service_started
    networks:
      - internal
    volumes:
      - ./logs/payment:/app/logs
    restart: unless-stopped

  settlement-service:
    build:
      context: .
      dockerfile: settlement-service/Dockerfile
    container_name: settlement-service
    expose:
      - "8085"
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      JAVA_TOOL_OPTIONS: "-Duser.timezone=Asia/Seoul -Xms256m -Xmx512m"
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: thock_settlement_db
      MYSQL_USER: thock_settlement_db_user
      MYSQL_PASSWORD: ${SETTLEMENT_DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      LOG_PATH: /app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redpanda:
        condition: service_started
    networks:
      - internal
    volumes:
      - ./logs/settlement:/app/logs
    restart: unless-stopped

  # ==================== Kafka ====================
  redpanda:
    image: redpandadata/redpanda:v24.1.1
    container_name: redpanda
    ports:
      - "29092:29092"
      - "9092:9092"
    command:
      - redpanda start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      - --advertise-kafka-addr=INTERNAL://redpanda:29092,EXTERNAL://localhost:9092
    networks:
      - internal
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    restart: unless-stopped

  redpanda-console:
    image: redpandadata/console:v2.5.2
    container_name: redpanda-console
    depends_on:
      - redpanda
    ports:
      - "8090:8090"
    environment:
      KAFKA_BROKERS: redpanda:29092
      SERVER_LISTENPORT: 8090
    networks:
      - internal
    restart: unless-stopped

  # ==================== MySQL Database ====================
  mysql:
    image: mysql:8.0
    container_name: thock-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal
    restart: unless-stopped

  # ==================== Monitoring ====================
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - internal
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.4
    container_name: promtail
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml
      - ./logs:/var/log/apps:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.3.1
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000/
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - internal
    restart: unless-stopped

  k6:
    image: grafana/k6:0.49.0
    profiles:
      - loadtest
    entrypoint:
      - k6
    environment:
      BASE_URL: ${K6_BASE_URL:-http://api-gateway:8080}
      PASSWORD: ${K6_PASSWORD:-password123!}
      RATE: ${K6_RATE:-10}
      DURATION: ${K6_DURATION:-2m}
      PRE_ALLOCATED_VUS: ${K6_PRE_ALLOCATED_VUS:-20}
      MAX_VUS: ${K6_MAX_VUS:-100}
      CATEGORY: ${K6_CATEGORY:-KEYBOARD}
      PRICE: ${K6_PRICE:-1000}
      SALE_PRICE: ${K6_SALE_PRICE:-0}
      STOCK: ${K6_STOCK:-5}
      BANK_CODE: ${K6_BANK_CODE:-088}
      ACCOUNT_NUMBER: ${K6_ACCOUNT_NUMBER:-1234567890}
      ACCOUNT_HOLDER: ${K6_ACCOUNT_HOLDER:-k6-seller}
      EXPERIMENT_NAME: ${K6_EXPERIMENT_NAME:-product-create-load}
      SLEEP_BETWEEN: ${K6_SLEEP_BETWEEN:-0}
      SUMMARY_PATH: ${K6_SUMMARY_PATH:-/results/product-create-summary.json}
    volumes:
      - ./loadtest:/scripts:ro
      - ./loadtest/results:/results
    networks:
      - internal
    depends_on:
      api-gateway:
        condition: service_started
      member-service:
        condition: service_started
      product-service:
        condition: service_started
    restart: "no"

  kcat:
    image: edenhill/kcat:1.7.1
    profiles:
      - loadtest
    entrypoint:
      - kcat
    networks:
      - internal
    depends_on:
      redpanda:
        condition: service_started
    restart: "no"

# ==================== Networks ====================
networks:
  internal:
    driver: bridge

# ==================== Volumes ====================
volumes:
  mysql-data:
  redpanda-data:
  prometheus-data:
  loki-data:
  grafana-data:
