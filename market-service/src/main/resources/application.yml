server:
  port: 8083

spring:
  application:
    name: market-service

  jackson:
    time-zone: Asia/Seoul

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    baseline-on-migrate: true
    baseline-version: 0

  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  cloud:
    openfeign:
      circuitbreaker:
        enabled: true                   # Feign 호출에 Resilience4j 서킷브레이커 연동 활성화
      client:
        config:
          default:
            connectTimeout: ${MARKET_FEIGN_DEFAULT_CONNECT_TIMEOUT:700}         # 연결을 700ms 안에 못 하면 실패
            readTimeout: ${MARKET_FEIGN_DEFAULT_READ_TIMEOUT:1200}              # 연결 후 응답 읽기를 1.2초 안에 못받으면 실패
            loggerLevel: basic          # 요청 메서드/URL, 응답 상태/시간 정도만 로그

resilience4j:
  circuitbreaker:
    instances:
      product-client:
        sliding-window-size: ${MARKET_CB_PRODUCT_SLIDING_WINDOW_SIZE:20}                 # 최근 호출 기준
        minimum-number-of-calls: ${MARKET_CB_PRODUCT_MINIMUM_NUMBER_OF_CALLS:10}         # 최소 호출 수가 쌓인 뒤 OPEN 판단
        failure-rate-threshold: ${MARKET_CB_PRODUCT_FAILURE_RATE_THRESHOLD:50}           # 실패율 임계치
        wait-duration-in-open-state: ${MARKET_CB_PRODUCT_WAIT_DURATION_IN_OPEN_STATE:10s}
        permitted-number-of-calls-in-half-open-state: ${MARKET_CB_PRODUCT_PERMITTED_CALLS_IN_HALF_OPEN:3}
        automatic-transition-from-open-to-half-open-enabled: true   # 외부 트리거 없이 시간 지나면 자동으로 OPEN -> HALF_OPEN 전환
        record-failure-predicate: com.thock.back.market.config.ExternalServiceCircuitBreakerRecordFailurePredicate
      payment-wallet-client:
        sliding-window-size: ${MARKET_CB_PAYMENT_SLIDING_WINDOW_SIZE:20}
        minimum-number-of-calls: ${MARKET_CB_PAYMENT_MINIMUM_NUMBER_OF_CALLS:10}
        failure-rate-threshold: ${MARKET_CB_PAYMENT_FAILURE_RATE_THRESHOLD:50}
        wait-duration-in-open-state: ${MARKET_CB_PAYMENT_WAIT_DURATION_IN_OPEN_STATE:10s}
        permitted-number-of-calls-in-half-open-state: ${MARKET_CB_PAYMENT_PERMITTED_CALLS_IN_HALF_OPEN:3}
        automatic-transition-from-open-to-half-open-enabled: true
        record-failure-predicate: com.thock.back.market.config.ExternalServiceCircuitBreakerRecordFailurePredicate

# 상품 정산 비율 (공통)
custom:
  market:
    product:
      payoutRate: 80

market:
  order:
    payment-timeout-minutes: 30
    timeout-check-interval-ms: 60000
    auto-confirm-days: 7
    auto-confirm-cron: "0 0 3 * * *"
    cleanup-retention-days: 30
    cleanup-cron: "0 0 3 * * *"
  retry:
    optimistic-lock:
      max-attempts: 3
      backoff-ms: 100
  feign:
    retry:
      period-ms: 100
      max-period-ms: 300
      max-attempts: 3
  metrics:
    enabled: true
    collect-interval-ms: 10000
    consumer-group-id: market-service
  kafka:
    topics:
      stock-changed:
        partitions: 1
        replicas: 1

# JWT 설정
jwt:
  secret: ${JWT_SECRET_KEY}
  access-token-exp-seconds: 1800
  refresh-token-exp-seconds: 1209600
  issuer: "thock"

# Actuator & Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

# SpringDoc
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: false

outbox:
  enabled: true
  poller:
    enabled: true
    interval-ms: 5000
    batch-size: 100
    max-retry: 5
  cleanup:
    cron: "0 0 3 * * *"

inbox:
  enabled: true

logging:
  level:
    io.github.resilience4j.circuitbreaker: DEBUG
    io.github.resilience4j.retry: DEBUG
    org.springframework.cloud.openfeign: DEBUG
    com.thock.back.market.out.client.ProductClient: DEBUG
    com.thock.back.market.out.client.PaymentWalletClient: DEBUG
    feign: DEBUG
