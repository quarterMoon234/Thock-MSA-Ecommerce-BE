spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false

  datasource:
    url: ${TEST_DB_URL:jdbc:mysql://localhost:3307/test_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${TEST_DB_USERNAME:test}
    password: ${TEST_DB_PASSWORD:test}

  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        generate_statistics: true

  task:
    scheduling:
      enabled: false

custom:
  global:
    productServiceUrl: http://localhost:8082
    paymentServiceUrl: http://localhost:8084

market:
  metrics:
    enabled: false

jwt:
  secret: thock-test-jwt-secret-key-which-is-long-enough-32chars
  access-token-exp-seconds: 1800
  refresh-token-exp-seconds: 1209600
  issuer: "thock-test"
