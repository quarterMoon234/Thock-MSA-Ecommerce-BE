spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:market_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        generate_statistics: true

  task:
    scheduling:
      enabled: false

custom:
  global:
    productServiceUrl: http://localhost:8082
    paymentServiceUrl: http://localhost:8084

market:
  metrics:
    enabled: false

jwt:
  secret: thock-test-jwt-secret-key-which-is-long-enough-32chars
  access-token-exp-seconds: 1800
  refresh-token-exp-seconds: 1209600
  issuer: "thock-test"
