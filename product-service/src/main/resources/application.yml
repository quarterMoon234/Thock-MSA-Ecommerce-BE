# ============================================
# 공통 설정
# ============================================
server:
  port: 8082

spring:
  application:
    name: product-service

  jackson:
    time-zone: Asia/Seoul

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# JWT 설정
jwt:
  secret: ${JWT_SECRET_KEY}
  access-token-exp-seconds: 1800
  refresh-token-exp-seconds: 1209600
  issuer: "thock"

# Actuator & Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

# SpringDoc
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: false

product:
  inbox:
    enabled: true
  kafka:
    consumer-group: product-service
  metrics:
    enabled: true
    collect-interval-ms: 10000
  event:
    publish-mode: outbox
  outbox:
    enabled: true
    max-retries: 10
    retry-delay-ms: 5000
    max-retry-delay-ms: 300000
    kafka:
      request-timeout-ms: 30000
      delivery-timeout-ms: 120000
      retry-backoff-ms: 1000
      max-block-ms: 60000
    poller:
      interval-ms: 3000
      after-send-delay-ms: 0
    cleanup:
      enabled: true
      interval-ms: 3600000
      retention-days: 7
      batch-size: 500
