product:
  metrics:
    enabled: ${PRODUCT_METRICS_ENABLED:true}
    collect-interval-ms: ${PRODUCT_METRICS_COLLECT_INTERVAL_MS:5000}
  partition-experiment:
    topic: ${PRODUCT_PARTITION_EXPERIMENT_TOPIC:market.order.stock.changed.experiment.single}
    single-topic:
      name: ${PRODUCT_PARTITION_EXPERIMENT_SINGLE_TOPIC:market.order.stock.changed.experiment.single}
    multi-topic:
      name: ${PRODUCT_PARTITION_EXPERIMENT_MULTI_TOPIC:market.order.stock.changed.experiment.multi}
      partitions: ${PRODUCT_PARTITION_EXPERIMENT_MULTI_TOPIC_PARTITIONS:3}
    replicas: ${PRODUCT_PARTITION_EXPERIMENT_TOPIC_REPLICAS:1}
  inbox-experiment:
    topic: ${PRODUCT_INBOX_EXPERIMENT_TOPIC:market.order.stock.changed.experiment.inbox}
    consumer-group: ${PRODUCT_INBOX_EXPERIMENT_CONSUMER_GROUP:product-inbox-experiment}
    replicas: ${PRODUCT_INBOX_EXPERIMENT_TOPIC_REPLICAS:1}
  event:
    publish-mode: ${PRODUCT_EVENT_PUBLISH_MODE:outbox}
    direct:
      async-after-commit-enabled: ${PRODUCT_EVENT_DIRECT_ASYNC_AFTER_COMMIT_ENABLED:false}
      async:
        core-pool-size: ${PRODUCT_EVENT_DIRECT_ASYNC_CORE_POOL_SIZE:8}
        max-pool-size: ${PRODUCT_EVENT_DIRECT_ASYNC_MAX_POOL_SIZE:16}
        queue-capacity: ${PRODUCT_EVENT_DIRECT_ASYNC_QUEUE_CAPACITY:2000}
  inbox:
    enabled: ${PRODUCT_INBOX_ENABLED:true}
    cleanup:
      enabled: ${PRODUCT_INBOX_CLEANUP_ENABLED:true}
      interval-ms: ${PRODUCT_INBOX_CLEANUP_INTERVAL_MS:3600000}
      retention-days: ${PRODUCT_INBOX_CLEANUP_RETENTION_DAYS:7}
      batch-size: ${PRODUCT_INBOX_CLEANUP_BATCH_SIZE:500}
  dlq:
    retry:
      interval-ms: ${PRODUCT_DLQ_RETRY_INTERVAL_MS:1000}
      max-attempts: ${PRODUCT_DLQ_RETRY_MAX_ATTEMPTS:2}
  kafka:
    consumer-group: ${PRODUCT_KAFKA_CONSUMER_GROUP:product-service}
    listener:
      concurrency: ${PRODUCT_KAFKA_LISTENER_CONCURRENCY:1}
  outbox:
    enabled: ${PRODUCT_OUTBOX_ENABLED:true}
    max-retries: ${PRODUCT_OUTBOX_MAX_RETRIES:10}
    retry-delay-ms: ${PRODUCT_OUTBOX_RETRY_DELAY_MS:5000}
    max-retry-delay-ms: ${PRODUCT_OUTBOX_MAX_RETRY_DELAY_MS:300000}
    kafka:
      request-timeout-ms: ${PRODUCT_OUTBOX_KAFKA_REQUEST_TIMEOUT_MS:2000}
      delivery-timeout-ms: ${PRODUCT_OUTBOX_KAFKA_DELIVERY_TIMEOUT_MS:5000}
      retry-backoff-ms: ${PRODUCT_OUTBOX_KAFKA_RETRY_BACKOFF_MS:1000}
      max-block-ms: ${PRODUCT_OUTBOX_KAFKA_MAX_BLOCK_MS:5000}
    poller:
      interval-ms: ${PRODUCT_OUTBOX_POLLER_INTERVAL_MS:15000}
      after-send-delay-ms: ${PRODUCT_OUTBOX_POLLER_AFTER_SEND_DELAY_MS:0}
    cleanup:
      enabled: ${PRODUCT_OUTBOX_CLEANUP_ENABLED:true}
      interval-ms: ${PRODUCT_OUTBOX_CLEANUP_INTERVAL_MS:3600000}
      retention-days: ${PRODUCT_OUTBOX_CLEANUP_RETENTION_DAYS:7}
      batch-size: ${PRODUCT_OUTBOX_CLEANUP_BATCH_SIZE:500}
