spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.boot.autoconfigure.batch.BatchAutoConfiguration

  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false

  datasource:
    driver-class-name: ${TEST_DB_DRIVER:org.h2.Driver}
    url: ${TEST_DB_URL:jdbc:h2:mem:product_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${TEST_DB_USERNAME:sa}
    password: ${TEST_DB_PASSWORD:}

  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: ${TEST_DB_DIALECT:org.hibernate.dialect.H2Dialect}

  batch:
    job:
      enabled: false

  task:
    scheduling:
      enabled: false

# 테스트에서는 환경 변수 대신 application-test.yml에 JWT 시크릿 키를 직접 설정
jwt:
  secret: thock-test-jwt-secret-key-which-is-long-enough-32chars
  access-token-exp-seconds: 1800
  refresh-token-exp-seconds: 1209600
  issuer: "thock-test"

product:
  event:
    publish-mode: direct
  outbox:
    enabled: false
    poller:
      enabled: false
    cleanup:
      enabled: false
  inbox:
    enabled: false
  cache:
    enabled: false
  metrics:
    enabled: false
